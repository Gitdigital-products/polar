<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polar Connection Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; }
        .btn {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }
        .btn:hover { background: #2980b9; }
        .frame-container {
            margin-top: 20px;
            border: 2px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 500px;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Polar Project Portal</h1>
    <p>This page is configured to interface with the <strong>GitDigital Polar</strong> project.</p>

    <section>
        <h3>External Link</h3>
        <p>Visit the official project page directly:</p>
        <a href="https://gitdigital-products.github.io/polar" target="_blank" class="btn">Launch Polar</a>
    </section>

    <hr>

    <section>
        <h3>Embedded View</h3>
        <div class="frame-container">
            <iframe src="https://gitdigital-products.github.io/polar" title="Polar Project Embedded"></iframe>
        </div>
    </section>
</div>

<script>
    // Option 3: Logic for fetching data (if the site has a /data.json or similar)
    async function checkProjectStatus() {
        try {
            // Note: This only works if the target site has CORS enabled
            const response = await fetch('https://gitdigital-products.github.io/polar');
            console.log("Connection Status:", response.status === 200 ? "Active" : "Issue detected");
        } catch (error) {
            console.log("Note: Cross-Origin restrictions may prevent direct data fetching.");
        }
    }
    
    checkProjectStatus();
</script>

</body>
</html>
